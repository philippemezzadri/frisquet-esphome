name: Update Changelog

on:
  push:
    tags:
      - 'v*'

jobs:
  changelog:
    name: Generate and commit changelog
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required to access full git history and tags
          ref: main       # checkout main rather than detached HEAD on tag
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install git-cliff
        run: |
          curl -sSfL https://github.com/orhun/git-cliff/releases/download/v2.13.1/git-cliff-2.13.1-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz git-cliff-2.13.1/git-cliff
          sudo mv git-cliff /usr/local/bin/
          git-cliff --version

      - name: Generate Changelog
        run: git-cliff --config cliff.toml --output CHANGELOG.md

      - name: Commit and push Changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "docs: update CHANGELOG for ${{ github.ref_name }}"
          git push origin HEAD:main
